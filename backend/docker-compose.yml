version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: dss-postgres
    environment:
      POSTGRES_USER: dss_user
      POSTGRES_PASSWORD: dss_password
      POSTGRES_DB: disaster_dss
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dss_user -d disaster_dss"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dss-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: dss-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dss-network

  # Kafka (for message streaming)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: dss-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - dss-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: dss-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - dss-network

  # Main API Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dss-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://dss_user:dss_password@postgres:5432/disaster_dss
      DATABASE_URL_SYNC: postgresql://dss_user:dss_password@postgres:5432/disaster_dss
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      DEBUG: "false"
      CORS_ORIGINS: "http://localhost:5173,http://localhost:3000"
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    networks:
      - dss-network
    restart: unless-stopped

  # Celery Worker (for background tasks)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dss-celery
    command: celery -A app.celery worker --loglevel=info
    depends_on:
      - postgres
      - redis
      - kafka
    environment:
      DATABASE_URL: postgresql+asyncpg://dss_user:dss_password@postgres:5432/disaster_dss
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - uploads:/app/uploads
    networks:
      - dss-network
    restart: unless-stopped

  # Nginx (for serving uploads and reverse proxy)
  nginx:
    image: nginx:alpine
    container_name: dss-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - api
    networks:
      - dss-network
    restart: unless-stopped

  # Prometheus (metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: dss-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - dss-network
    restart: unless-stopped

  # Grafana (dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: dss-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - dss-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  uploads:
  prometheus_data:
  grafana_data:

networks:
  dss-network:
    driver: bridge
